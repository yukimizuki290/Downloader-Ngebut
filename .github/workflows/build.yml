name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git python3 python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev
          sudo apt install -y libgstreamer1.0-gstreamer-lite1.0-dev libgstreamer-plugins-base1.0-dev
          pip3 install --user --upgrade pip
          pip3 install --user Cython==0.29.33 buildozer

      - name: Build with Buildozer
        run: |
          # Perintah sakti buat accept license otomatis di Linux
          yes | buildozer android debug
        
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: Downloader-Ngebut-APK
          path: bin/*.apk
