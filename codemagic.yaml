workflows:
  my-workflow:
    name: Build APK Downloader Ngebut
    instance_type: mac_mini_m1
    scripts:
      - name: Install Dependencies
        script: |
          pip install --upgrade pip
          pip install setuptools Cython==0.29.33 buildozer
      - name: Build APK
        script: |
          buildozer android debug
    artifacts:
      - bin/*.apk
